name: Build Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: ScoreChaser-Windows
            ext: .exe
          - os: ubuntu-latest
            artifact: ScoreChaser-Linux
            ext: ""
          - os: macos-latest
            artifact: ScoreChaser-macOS
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: pyinstaller ScoreChaser.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/ScoreChaser${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          cp artifacts/ScoreChaser-Windows/ScoreChaser.exe release/ScoreChaser-Windows.exe
          cp artifacts/ScoreChaser-Linux/ScoreChaser release/ScoreChaser-Linux
          cp artifacts/ScoreChaser-macOS/ScoreChaser release/ScoreChaser-macOS
          chmod +x release/ScoreChaser-Linux release/ScoreChaser-macOS

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/ScoreChaser-Windows.exe
            release/ScoreChaser-Linux
            release/ScoreChaser-macOS
          generate_release_notes: true
